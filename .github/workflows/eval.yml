name: RAG Eval

on:
  pull_request:
    paths:
      - "intelliflow/backend/**"
      - ".github/workflows/eval.yml"

jobs:
  rag-eval:
    name: Run RAG evaluation harness
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend
        working-directory: intelliflow/backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run eval (retrieval only, no LLM keys required)
        id: eval
        working-directory: intelliflow/backend
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MONGODB_URI: mongodb://localhost:27017
        run: |
          # If no keys are present, skip ingest + LLM eval; report retrieval-only metrics.
          if [ -z "$OPENAI_API_KEY" ]; then
            python -c "print('Eval skipped: OPENAI_API_KEY not set (PRs from forks); reporting empty metrics.')"
            echo '{"aggregate":{"n":0,"recall_at_5_mean":0,"component_f1_mean":-1,"hallucination_rate":-1,"mean_latency_ms":0}}' > eval_report.json
            exit 0
          fi
          python -m app.rag.ingest --reset
          python -m app.rag.eval.eval --out eval_report.json --max-hallucination 0.05
        continue-on-error: true

      - name: Comment results on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'intelliflow/backend/eval_report.json';
            if (!fs.existsSync(path)) return;
            const report = JSON.parse(fs.readFileSync(path, 'utf-8')).aggregate || {};
            const fmt = (v) => (typeof v === 'number' ? v.toFixed(3) : v);
            const body = [
              '### RAG eval results',
              '',
              `| metric | value |`,
              `|---|---|`,
              `| n | ${report.n ?? '?'} |`,
              `| recall@5 (mean) | ${fmt(report.recall_at_5_mean)} |`,
              `| component_f1 (mean) | ${fmt(report.component_f1_mean)} |`,
              `| hallucination_rate | ${fmt(report.hallucination_rate)} |`,
              `| mean latency (ms) | ${fmt(report.mean_latency_ms)} |`,
              '',
              'Gate: hallucination_rate must be ≤ 0.05.',
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Fail if eval step failed (hallucination_rate > 5%)
        if: steps.eval.outcome == 'failure'
        run: exit 1
